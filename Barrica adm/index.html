// ---- BOTONES TARJETA ----
const BotonesTarjeta = ({ nombre, apellido, dni, empresa, telefono, categoria }) => {
  const [loading, setLoading] = useState(false);

  const getCanvas = () => new Promise((res, rej) => {
    if (!window.html2canvas) { rej("no cargado"); return; }
    window.html2canvas(document.getElementById("tarjeta-preview"), { scale: 3, useCORS: true, backgroundColor: null }).then(res).catch(rej);
  });

  const nombre_archivo = () => ("tarjeta_barrica_" + ((nombre||"") + "_" + (apellido||"")).trim().replace(/ /g,"_") + ".png");

  const descargar = async () => {
    setLoading(true);
    try {
      const canvas = await getCanvas();
      const a = document.createElement("a"); a.download = nombre_archivo(); a.href = canvas.toDataURL("image/png"); a.click();
    } catch(e) { alert("Error"); }
    setLoading(false);
  };

  const enviarMail = async () => {
    setLoading(true);
    try {
      const canvas = await getCanvas();
      const a = document.createElement("a"); a.download = nombre_archivo(); a.href = canvas.toDataURL("image/png"); a.click();
      setTimeout(() => window.open("https://mail.google.com/mail/?view=cm&su=Tarjeta+Corporativa+Barrica+Hotel&body=Te+adjunto+tu+tarjeta+corporativa+del+Barrica+Hotel.+%F0%9F%8D%B7", "_blank"), 800);
    } catch(e) { alert("Error"); }
    setLoading(false);
  };

  const compartirWA = async () => {
    setLoading(true);
    try {
      const canvas = await getCanvas();
      canvas.toBlob(async (blob) => {
        const file = new File([blob], nombre_archivo(), { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: "Tarjeta Barrica Hotel" });
        } else {
          const a = document.createElement("a"); a.download = nombre_archivo(); a.href = canvas.toDataURL("image/png"); a.click();
          setTimeout(() => window.open("https://wa.me/", "_blank"), 800);
        }
        setLoading(false);
      }, "image/png");
    } catch(e) { alert("Error"); setLoading(false); }
  };

  const guardar = async () => {
    setLoading(true);
    try {
      const fecha = new Date().toLocaleDateString("es-AR");
      await fetch("https://script.google.com/macros/s/AKfycbzmkUMg1ANywzTFMW2twxFROMVe5xJTG742ZOL839HjDDfH0E2q0l1rhIQqm5-C9kzaCA/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, apellido, dni, empresa, telefono, categoria, fecha })
      });
      alert("✅ Tarjeta guardada en la base de datos");
    } catch(e) { alert("Error al guardar"); }
    setLoading(false);
  };

  const btn = (color) => ({ flex:1, background:color, color:"#e8e0cd", border:"none", borderRadius:8, padding:"11px 6px", cursor:"pointer", fontFamily:"sans-serif", fontSize:12, fontWeight:500, opacity:loading?0.6:1, textAlign:"center", lineHeight:1.4 });

  return (
    <div className="no-print">
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr", gap:6, marginBottom:10 }}>
        <button onClick={descargar} disabled={loading} style={btn("#2a4a2a")}>⬇️<br/><span style={{fontSize:10}}>Descargar</span></button>
        <button onClick={() => window.print()} style={btn("#3A7023")}>🖨️<br/><span style={{fontSize:10}}>Imprimir</span></button>
        <button onClick={compartirWA} disabled={loading} style={btn("#25D366")}>💬<br/><span style={{fontSize:10}}>WhatsApp</span></button>
        <button onClick={enviarMail} disabled={loading} style={btn("#4285F4")}>📧<br/><span style={{fontSize:10}}>Gmail</span></button>
        <button onClick={guardar} disabled={loading} style={btn("#2a4a2a")}>💾<br/><span style={{fontSize:10}}>Guardar</span></button>
      </div>
      <p style={{ fontSize:11, color:"#888", textAlign:"center" }}>Gmail: descargá la imagen y adjuntala · WhatsApp funciona mejor desde celular</p>
    </div>
  );
};

const MensajePersonalizado = ({ onBack, conPromo }) => {
  const [texto, setTexto] = useState("");
  const [loading, setLoading] = useState(false);
  const previewRef = useRef(null);
  const palabras = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;

  useEffect(() => {
    if (!window.html2canvas) {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      document.head.appendChild(s);
    }
  }, []);

  const compartirWA = async () => {
    if (!texto.trim()) { alert("Escribí un mensaje primero"); return; }
    setLoading(true);
    try {
      const canvas = await new Promise((res,rej) => {
        window.html2canvas(previewRef.current, { scale:2, useCORS:true, backgroundColor:"#f0ebe0" }).then(res).catch(rej);
      });
      canvas.toBlob(async (blob) => {
        const file = new File([blob], "barrica_mensaje.png", { type:"image/png" });
        if (navigator.canShare && navigator.canShare({ files:[file] })) {
          await navigator.share({ files:[file], title:"Barrica Hotel" });
        } else {
          const a = document.createElement("a"); a.download = "barrica_mensaje.png"; a.href = canvas.toDataURL("image/png"); a.click();
          setTimeout(() => window.open("https://wa.me/", "_blank"), 800);
        }
        setLoading(false);
      }, "image/png");
    } catch(e) { alert("Error al compartir"); setLoading(false); }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#f0ebe0", padding:"32px 20px", fontFamily:"sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');`}</style>
      <div style={{ maxWidth:480, margin:"0 auto" }}>
        <button onClick={onBack} style={{ background:"none", border:"2px solid #2a4a2a", color:"#2a4a2a", borderRadius:8, padding:"8px 18px", cursor:"pointer", marginBottom:24, fontSize:14 }}>← Volver</button>
        <h1 style={{ fontFamily:"'Playfair Display',serif", color:"#2a4a2a", fontSize:22, marginBottom:6 }}>{conPromo ? "Enviar Promoción" : "Mensaje Personalizado"}</h1>
        <p style={{ fontSize:13, color:"#666", marginBottom:24 }}>Barrica Hotel · Realicó, La Pampa</p>

        <div style={{ background:"#fff", borderRadius:12, padding:20, marginBottom:20, boxShadow:"0 2px 12px rgba(42,74,42,.08)" }}>
          <label style={{ fontSize:11, fontWeight:500, color:"#555", textTransform:"uppercase", letterSpacing:".06em", display:"block", marginBottom:6 }}>
            Mensaje <span style={{color:palabras>50?"#e74c3c":"#999"}}>( {palabras}/50 palabras )</span>
          </label>
          <textarea value={texto} onChange={e=>setTexto(e.target.value)} spellCheck={true} lang="es"
            placeholder="Escribí tu mensaje acá..." rows={5}
            style={{ width:"100%", padding:"10px 12px", border:`1px solid ${palabras>50?"#e74c3c":"#d0c8b8"}`, borderRadius:8, fontSize:14, background:"#f8f5ef", color:"#333", outline:"none", boxSizing:"border-box", resize:"vertical", fontFamily:"'DM Sans',sans-serif" }} />
          {palabras>50 && <p style={{color:"#e74c3c",fontSize:12,marginTop:4}}>Máximo 50 palabras</p>}
        </div>

        {texto.trim() && (
          <div>
            <p style={{ fontSize:11, fontWeight:500, color:"#888", textTransform:"uppercase", letterSpacing:".06em", marginBottom:10 }}>Vista previa</p>
            <div ref={previewRef} style={{ background:"#f0ebe0", borderRadius:14, overflow:"hidden", marginBottom:16, boxShadow:"0 4px 20px rgba(42,74,42,.12)" }}>
              
              {/* Bloque superior: logo + promo con foto de fondo */}
              <div style={{ position:"relative", padding:"32px 24px 28px", textAlign:"center", minHeight: conPromo ? 340 : 100 }}>
                {conPromo && <div style={{ position:"absolute", inset:0, backgroundImage:`url(${ROOM_IMG})`, backgroundSize:"cover", backgroundPosition:"center", opacity:0.2 }} />}
                <div style={{ position:"relative", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                  <img src={LOGO} style={{ width:64, height:64, borderRadius:"50%", objectFit:"cover", border:"2px solid #2a4a2a" }} alt="Logo" />

                  <div style={{ fontSize:9, color:"#2a4a2a", letterSpacing:3, opacity:0.6 }}>· REALICÓ · LA PAMPA ·</div>
                  {conPromo && (
                    <div style={{ marginTop:14 }}>
                      <div style={{ fontSize:17, fontWeight:"bold", color:"#2a4a2a", marginBottom:12 }}>20% Off para Viajantes y Empresas</div>
                      <div style={{ fontSize:13, color:"#2a4a2a", lineHeight:2, opacity:0.9 }}>
                        Espacios para trabajar.<br/>Comedor 24 Hs.<br/>Habitaciones con escritorio.<br/>Wi-Fi en todo el hotel.<br/>Estacionamiento.<br/>Desayuno Incluido.
                      </div>

                    </div>
                  )}

const RegistroTarjetas = ({ onBack }) => {
  const [tarjetas, setTarjetas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");

    fetch("https://script.google.com/macros/s/AKfycbzmkUMg1ANywzTFMW2twxFROMVe5xJTG742ZOL839HjDDfH0E2q0l1rhIQqm5-C9kzaCA/exec?action=get")
      .then(r => r.json())
      .then(data => {
        if (data && data.tarjetas) setTarjetas(data.tarjetas);
        else setError("No se pudieron cargar los datos");
        setLoading(false);
      })
      .catch(() => {
        setError("No se pudieron cargar los datos. Verificá tu conexión.");
        setLoading(false);

  const [screen, setScreen] = useState("login");
  if (screen==="login") return <Login onLogin={()=>setScreen("dashboard")} />;
  if (screen==="tarjeta") return <TarjetaCorporativa onBack={()=>setScreen("dashboard")} />;
  if (screen==="mensaje") return <MensajePersonalizado onBack={()=>setScreen("dashboard")} conPromo={false} />;
  if (screen==="promo") return <MensajePersonalizado onBack={()=>setScreen("dashboard")} conPromo={true} />;
  if (screen==="registro") return <RegistroTarjetas onBack={()=>setScreen("dashboard")} />;
  return <Dashboard onLogout={()=>setScreen("login")} onOpenTarjeta={()=>setScreen("tarjeta")} onOpenMensaje={()=>setScreen("mensaje")} onOpenPromo={()=>setScreen("promo")} onOpenRegistro={()=>setScreen("registro")} />;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
